---
dependency:
  name: galaxy
  options:
    role-file: req.yml
    requirements-file: req.yml

lint: |
  set -e
  yamllint .
  ansible-lint

driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: test-iscsi-ubuntu2204
    box: githubixx/ubuntu-22.04
    memory: 2048
    cpus: 2
    provider_raw_config_args:
      - "storage :file, :size => '1G', :device => 'vdb'"
    interfaces:
      - auto_config: true
        network_name: private_network
        type: static
        ip: 172.16.10.10
    groups:
      - ubuntu
  - name: test-iscsi-archlinux
    box: githubixx/archlinux
    memory: 2048
    cpus: 2
    provider_raw_config_args:
      - "storage :file, :size => '1G', :device => 'vdb'"
      - "storage :file, :size => '1G', :device => 'vdc'"
    interfaces:
      - auto_config: true
        network_name: private_network
        type: static
        ip: 172.16.10.20
    groups:
      - archlinux
  - name: test-iscsi-ubuntu2404
    box: githubixx/ubuntu-24.04
    memory: 2048
    cpus: 2
    provider_raw_config_args:
      - "storage :file, :size => '1G', :device => 'vdb'"
    interfaces:
      - auto_config: true
        network_name: private_network
        type: static
        ip: 172.16.10.30
    groups:
      - ubuntu
  - name: test-iscsi-ubuntu2604
    box: githubixx/ubuntu-26.04
    memory: 2048
    cpus: 2
    provider_raw_config_args:
      - "storage :file, :size => '1G', :device => 'vdb'"
    interfaces:
      - auto_config: true
        network_name: private_network
        type: static
        ip: 172.16.10.40
    groups:
      - ubuntu

provisioner:
  name: ansible
  playbooks:
    prepare: prepare.yml
    converge: ${MOLECULE_PLAYBOOK:-converge.yml}

scenario:
  name: default
  destroy_sequence:
    - destroy
    - cleanup

verifier:
  name: ansible
