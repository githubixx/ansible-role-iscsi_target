---
- name: Setup Archlinux hosts
  hosts: archlinux
  gather_facts: false
  become: true
  tasks:
    - name: Init pacman
      ansible.builtin.raw: |
        pacman-key --init
        pacman-key --populate archlinux
      changed_when: false

    - name: Updating pacman cache
      ansible.builtin.raw: |
        pacman -Sy
      changed_when: false

    - name: Install Python for Ansible
      ansible.builtin.raw: |
        pacman -S --noconfirm python
      changed_when: false

    - name: Upgrade the whole system
      ansible.builtin.raw: |
        pacman --noconfirm -Su
      changed_when: false

    - name: Reboot for kernel updates
      ansible.builtin.reboot:

- name: Setup Ubuntu hosts
  hosts: ubuntu
  remote_user: vagrant
  become: true
  gather_facts: true
  tasks:
    - name: Update APT package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

- name: Setup initiator hosts
  hosts: initiator
  remote_user: vagrant
  become: true
  gather_facts: true
  vars_files:
    - vars/initiator.yml
  tasks:
    - name: Update APT package cache on initiator hosts
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install open-iscsi on initiator hosts
      ansible.builtin.apt:
        name: open-iscsi
        state: present

    - name: Configure initiator IQN
      ansible.builtin.lineinfile:
        path: /etc/iscsi/initiatorname.iscsi
        regexp: '^InitiatorName='
        line: 'InitiatorName={{ iscsi_initiator_test.initiator_iqn }}'
      notify:
        - Restart iscsid

    - name: Ensure iscsid is enabled and started
      ansible.builtin.systemd_service:
        name: iscsid
        enabled: true
        state: started
  handlers:
    - name: Restart iscsid
      ansible.builtin.systemd_service:
        name: iscsid
        state: restarted
